name: Validate skills/index.json

on:
  pull_request:
    paths:
      - "skills/**"
      - "scripts/validate-skills-index.py"
      - ".github/workflows/validate-skills-index.yml"
  push:
    branches:
      - main
    paths:
      - "skills/**"
      - "scripts/validate-skills-index.py"
      - ".github/workflows/validate-skills-index.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate structure and references
        run: python3 scripts/validate-skills-index.py
