name: Release

on:
  release:
    types: [published]

permissions:
  contents: write   # upload assets + commit back release.json

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version vars
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "TAG=$TAG"         >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "→ Building release $TAG (version $VERSION)"

      - name: Read domain versions
        id: domains
        run: |
          read_ver() {
            python3 -c "import json; d=json.load(open('registry.json')); print(d['manifests'].get('$1',{}).get('version',''))" 2>/dev/null || echo ''
          }
          BOARDS="$(read_ver boardsAndChips)"
          DEMOS="$(read_ver demos)"
          PLATFORMS="$(read_ver platforms)"
          SKILLS="$(read_ver skills)"
          echo "boards=$BOARDS"       >> "$GITHUB_OUTPUT"
          echo "demos=$DEMOS"         >> "$GITHUB_OUTPUT"
          echo "platforms=$PLATFORMS" >> "$GITHUB_OUTPUT"
          echo "skills=$SKILLS"       >> "$GITHUB_OUTPUT"
          echo "→ Domain versions — boardsAndChips=$BOARDS demos=$DEMOS platforms=$PLATFORMS skills=$SKILLS"

      - name: Stage package contents
        run: |
          mkdir -p staging
          cp registry.json staging/
          for dir in boards-and-chips demos platforms skills; do
            [ -d "$dir" ] && cp -r "$dir" staging/ && echo "  + $dir/"
          done
          FILE_COUNT="$(find staging -type f | wc -l)"
          echo "→ Staged $FILE_COUNT files"

      - name: Create tarball
        run: |
          tar -czf manifests.tar.gz -C staging .
          SHA256="$(sha256sum manifests.tar.gz | awk '{print $1}')"
          SIZE="$(wc -c < manifests.tar.gz | tr -d ' ')"
          echo "SHA256=$SHA256" >> "$GITHUB_ENV"
          echo "SIZE=$SIZE"     >> "$GITHUB_ENV"
          echo "→ manifests.tar.gz — ${SIZE} bytes, sha256=${SHA256}"

      - name: Generate release.json
        run: |
          python3 - <<'EOF'
          import json, os
          tag     = os.environ["TAG"]
          version = os.environ["VERSION"]
          sha256  = os.environ["SHA256"]
          size    = int(os.environ["SIZE"])
          repo_gh = "tuya/tuyaopen-ide-manifests"
          repo_ge = "tuya-open/tuyaopen-ide-manifests"
          manifest = {
            "schemaVersion": 1,
            "version": version,
            "tag": tag,
            "publishedAt": __import__("datetime").datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
            "package": {
              "github": f"https://github.com/{repo_gh}/releases/download/{tag}/manifests.tar.gz",
              "gitee":  f"https://gitee.com/{repo_ge}/releases/download/{tag}/manifests.tar.gz",
              "sha256": sha256,
              "size":   size,
            },
            "domains": {
              "boardsAndChips": {"version": os.environ.get("BOARDS_VER", "")},
              "demos":          {"version": os.environ.get("DEMOS_VER", "")},
              "platforms":      {"version": os.environ.get("PLATFORMS_VER", "")},
              "skills":         {"version": os.environ.get("SKILLS_VER", "")},
            },
          }
          json.dump(manifest, open("release.json", "w"), indent=2)
          print("→ release.json generated")
          print(json.dumps(manifest, indent=2))
          EOF
        env:
          BOARDS_VER:    ${{ steps.domains.outputs.boards }}
          DEMOS_VER:     ${{ steps.domains.outputs.demos }}
          PLATFORMS_VER: ${{ steps.domains.outputs.platforms }}
          SKILLS_VER:    ${{ steps.domains.outputs.skills }}

      - name: Upload GitHub Release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "→ Uploading assets to GitHub Release $TAG…"
          gh release upload "$TAG" manifests.tar.gz release.json --clobber
          echo "✓ GitHub Release assets uploaded"

      - name: Commit release.json to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add release.json
          if git diff --cached --quiet; then
            echo "→ release.json unchanged, skip commit"
          else
            git commit -m "chore(release): update release.json to $VERSION [skip ci]"
            git push origin main
            echo "✓ release.json committed to main"
          fi

      - name: Sync versioned Release to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_REPO: tuya-open/tuyaopen-ide-manifests
          TAG: ${{ env.TAG }}
          GITEE_ASSETS_DIR: ./gitee-assets
          GITEE_TARGET_COMMITISH: main
        run: |
          echo "→ Syncing versioned release ($TAG) to Gitee…"
          mkdir -p gitee-assets
          cp manifests.tar.gz release.json gitee-assets/
          bash scripts/sync-gitee-release.sh

      - name: Sync latest Release to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_REPO: tuya-open/tuyaopen-ide-manifests
          TAG: latest
          GITEE_ASSETS_DIR: ./gitee-latest-assets
          GITEE_TARGET_COMMITISH: main
        run: |
          echo "→ Updating Gitee 'latest' release (discovery entry)…"
          mkdir -p gitee-latest-assets
          cp release.json gitee-latest-assets/
          bash scripts/sync-gitee-release.sh

      - name: Summary
        run: |
          echo "### Release ${{ env.TAG }} published successfully" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ env.VERSION }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package size | ${{ env.SIZE }} bytes |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SHA-256 | \`${{ env.SHA256 }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| GitHub asset | [manifests.tar.gz](https://github.com/tuya/tuyaopen-ide-manifests/releases/download/${{ env.TAG }}/manifests.tar.gz) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Gitee discovery | [release.json](https://gitee.com/tuya-open/tuyaopen-ide-manifests/releases/download/latest/release.json) |" >> "$GITHUB_STEP_SUMMARY"
