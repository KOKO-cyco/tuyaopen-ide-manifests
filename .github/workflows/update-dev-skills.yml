name: Update Dev Skills

on:
  repository_dispatch:
    types: [dev-skills-released]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update skills/index.json
        env:
          VERSION:    ${{ github.event.client_payload.version }}
          SHA256:     ${{ github.event.client_payload.sha256 }}
          SIZE:       ${{ github.event.client_payload.size }}
          GITHUB_URL: ${{ github.event.client_payload.github_url }}
          GITEE_URL:  ${{ github.event.client_payload.gitee_url }}
        run: |
          jq --arg version    "$VERSION" \
             --arg github_url "$GITHUB_URL" \
             --arg gitee_url  "$GITEE_URL" \
             --arg sha256     "$SHA256" \
             --argjson size   "$SIZE" \
             '.devSkillsRelease = {version: $version, github: $github_url, gitee: $gitee_url, sha256: $sha256, size: $size}' \
             skills/index.json > /tmp/index.json && mv /tmp/index.json skills/index.json
          echo "→ devSkillsRelease updated to $VERSION"

      - name: Commit and push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/index.json
          if git diff --cached --quiet; then
            echo "→ skills/index.json unchanged, skip commit"
          else
            git commit -m "chore(skills): bump TuyaOpen-dev-skills to v${{ github.event.client_payload.version }} [skip ci]"
            git push origin main
            echo "✓ skills/index.json updated to v${{ github.event.client_payload.version }}"
          fi
